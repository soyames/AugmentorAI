services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: ${AUGMENTOR_SERVER_IMAGE:-augmentorai-server:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/server/data/augmentor.db
      CORS_ORIGINS: ${AUGMENTOR_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      OLLAMA_URL: ${AUGMENTOR_OLLAMA_URL:-http://host.docker.internal:11434}
      DEFAULT_MODEL: ${AUGMENTOR_DEFAULT_MODEL:-qwen2.5-coder:3b}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HERMES_API_URL: ${HERMES_API_URL:-http://127.0.0.1:8642}
      HERMES_MODEL: ${HERMES_MODEL:-deepseek-chat}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
    volumes:
      - augmentor-server-data:/app/server/data
    ports:
      - "${AUGMENTOR_API_PORT:-8010}:8010"
    networks:
      - augmentor

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: ${AUGMENTOR_WEB_IMAGE:-augmentorai-web:latest}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${AUGMENTOR_WEB_PORT:-8080}:8080"
    networks:
      - augmentor

volumes:
  augmentor-server-data:

networks:
  augmentor:
    driver: bridge
