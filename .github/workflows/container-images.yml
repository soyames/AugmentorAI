name: Container Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          dh_repo="${{ secrets.DOCKERHUB_USERNAME }}"
          echo "server=${repo}/server" >> "$GITHUB_OUTPUT"
          echo "web=${repo}/web" >> "$GITHUB_OUTPUT"
          echo "dh_server=${dh_repo}/augmentorai-server" >> "$GITHUB_OUTPUT"
          echo "dh_web=${dh_repo}/augmentorai-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.server }}:latest
            ${{ steps.images.outputs.server }}:${{ github.sha }}
            ${{ steps.images.outputs.dh_server }}:latest
            ${{ steps.images.outputs.dh_server }}:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.web }}:latest
            ${{ steps.images.outputs.web }}:${{ github.sha }}
            ${{ steps.images.outputs.dh_web }}:latest
            ${{ steps.images.outputs.dh_web }}:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
