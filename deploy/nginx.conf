# AugmentorAI — Nginx reverse proxy config
# Place in /etc/nginx/conf.d/augmentor.digitalconcordia.com.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# Assumptions:
# - Docker/Podman Ollama container at http://127.0.0.1:11434
# - FastAPI backend running at http://127.0.0.1:8010
# - Frontend at /opt/augmentorai/web (or served by npm run dev)
# - SSL via Let's Encrypt (Certbot)

# API upstream
upstream augmentorai-api {
    server 127.0.0.1:8010;
    keepalive 32;
}

# Ollama upstream (internal only — protect from external access)
upstream augmentorai-ollama {
    server 127.0.0.1:11434;
    keepalive 16;
}

server {
    listen 80;
    server_name augmentor.digitalconcordia.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name augmentor.digitalconcordia.com;

    ssl_certificate     /etc/letsencrypt/live/augmentor.digitalconcordia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/augmentor.digitalconcordia.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Max upload size (for audio + PDF uploads)
    client_max_body_size 50M;

    # API proxy
    location /api/ {
        proxy_pass http://augmentorai-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # WebSocket proxy (for live transcription)
    location /ws/ {
        proxy_pass http://augmentorai-api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check
    location /health {
        proxy_pass http://augmentorai-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend (React build)
    location / {
        root /opt/augmentorai/web/dist;
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny Ollama direct access
    location /ollama/ {
        internal;
        proxy_pass http://augmentorai-ollama;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Logs
    access_log /var/log/nginx/augmentor-access.log;
    error_log  /var/log/nginx/augmentor-error.log;
}
