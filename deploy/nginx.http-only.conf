# AugmentorAI — Nginx reverse proxy (HTTP-only, pre-SSL)
# Place in /etc/nginx/conf.d/augmentor.digitalconcordia.com.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
# After DNS: sudo certbot --nginx -d augmentor.digitalconcordia.com

upstream augmentorai-api {
    server 127.0.0.1:8010;
    keepalive 32;
}

server {
    listen 80;
    server_name augmentor.digitalconcordia.com;

    # Max upload size (for audio + PDF uploads)
    client_max_body_size 50M;

    # API proxy
    location /api/ {
        proxy_pass http://augmentorai-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy (for live transcription)
    location /ws/ {
        proxy_pass http://augmentorai-api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check
    location /health {
        proxy_pass http://augmentorai-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend (React build)
    location / {
        root /opt/augmentorai/web/dist;
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/augmentor-access.log;
    error_log  /var/log/nginx/augmentor-error.log;
}
